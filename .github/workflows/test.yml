name: Tests

on:
  push:
    branches: [master, 'feature/**']
  pull_request:
    branches: [master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cognitia
          POSTGRES_USER: cognitia
          POSTGRES_PASSWORD: cognitia_dev_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Initialize PostgreSQL schema
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cognitia
          DB_USER: cognitia
          DB_PASSWORD: cognitia_dev_password
          DB_SSL: 'false'
        run: |
          npm install -g psql || true
          until pg_isready -h localhost -p 5432 -U cognitia; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done
          PGPASSWORD=cognitia_dev_password psql -h localhost -U cognitia -d cognitia << 'EOF'
          -- Patients table
          CREATE TABLE IF NOT EXISTS patients (
            id SERIAL PRIMARY KEY,
            full_name VARCHAR(255) NOT NULL,
            birth_date DATE NOT NULL,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );

          -- Sessions table
          CREATE TABLE IF NOT EXISTS sessions (
            id SERIAL PRIMARY KEY,
            patient_id INTEGER NOT NULL REFERENCES patients(id),
            created_by_user_id INTEGER NOT NULL,
            status VARCHAR(50) DEFAULT 'PENDIENTE',
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );

          -- Runtime table (timing/execution state)
          CREATE TABLE IF NOT EXISTS runtime (
            id SERIAL PRIMARY KEY,
            session_id INTEGER NOT NULL REFERENCES sessions(id),
            active_item_code VARCHAR(10),
            runtime_status VARCHAR(50) DEFAULT 'PENDIENTE',
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );

          -- Runtime events (silence events, etc.)
          CREATE TABLE IF NOT EXISTS runtime_events (
            id SERIAL PRIMARY KEY,
            runtime_id INTEGER NOT NULL REFERENCES runtime(id),
            event_type VARCHAR(50),
            event_data JSONB,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );

          -- Results table
          CREATE TABLE IF NOT EXISTS results (
            id SERIAL PRIMARY KEY,
            session_id INTEGER NOT NULL REFERENCES sessions(id),
            item_code VARCHAR(10) NOT NULL,
            position_in_session INTEGER,
            evaluated_outcome VARCHAR(50),
            result_data JSONB,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );

          -- Indices for performance
          CREATE INDEX IF NOT EXISTS idx_sessions_patient_id ON sessions(patient_id);
          CREATE INDEX IF NOT EXISTS idx_runtime_session_id ON runtime(session_id);
          CREATE INDEX IF NOT EXISTS idx_runtime_events_runtime_id ON runtime_events(runtime_id);
          CREATE INDEX IF NOT EXISTS idx_results_session_id ON results(session_id);
          EOF

      - name: Build backend
        working-directory: ./backend
        run: npm run build

      - name: Run backend tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cognitia
          DB_USER: cognitia
          DB_PASSWORD: cognitia_dev_password
          DB_SSL: 'false'
          NODE_ENV: test
        run: npm test

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
