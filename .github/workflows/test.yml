name: Tests

on:
  push:
    branches: [master, 'feature/**']
  pull_request:
    branches: [master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cognitia
          POSTGRES_USER: cognitia
          POSTGRES_PASSWORD: cognitia_dev_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Initialize PostgreSQL schema
        env:
          PGPASSWORD: cognitia_dev_password
        run: |
          until pg_isready -h localhost -p 5432 -U cognitia; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done
          psql -h localhost -U cognitia -d cognitia -f infra/postgres/init/001-init-schema.sql

      - name: Build backend
        working-directory: ./backend
        run: npm run build

      - name: Run backend tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cognitia
          DB_USER: cognitia
          DB_PASSWORD: cognitia_dev_password
          DB_SSL: 'false'
          NODE_ENV: test
        run: npm test

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
