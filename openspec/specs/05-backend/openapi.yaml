openapi: 3.0.0
info:
  title: API Specification
  version: 1.1.0
paths:
  /api/patients/{id}:
    patch:
      summary: Update patient demographics
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                birthDate:
                  type: string
                  format: date
      responses:
        '200':
          description: Updated patient
        '400':
          description: Validation error
        '404':
          description: Patient not found
    delete:
      summary: Delete patient
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Patient deleted
        '404':
          description: Patient not found
        '409':
          description: Patient cannot be deleted because sessions exist

  /api/sessions:
    post:
      summary: Create session with duplicate-open-session prevention
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patientId, createdByUserId]
              properties:
                patientId:
                  type: integer
                createdByUserId:
                  type: integer
      responses:
        '201':
          description: Session created
        '400':
          description: Invalid request body
        '409':
          description: Patient already has an open session
