<form class="login-form" (ngSubmit)="submit()">
  <h3>Recuperar contraseña</h3>

  <div class="form-group">
    <label for="recover-email">Email</label>
    <input id="recover-email" [(ngModel)]="email" name="email" type="email" autocomplete="email" required />
  </div>

  <p *ngIf="successMessage" class="success-message">{{ successMessage }}</p>
  <p *ngIf="debugToken" class="success-message">Token de recuperación (entorno dev): {{ debugToken }}</p>
  <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

  <button class="login-button" type="submit" [disabled]="loading || !email.trim()">
    {{ loading ? 'Procesando...' : 'Solicitar recuperación' }}
  </button>

  <p>
    <a routerLink="/auth/reset-password">Ya tengo token de recuperación</a>
  </p>
  <p>
    <a routerLink="/auth/login">Volver a login</a>
  </p>
</form>
