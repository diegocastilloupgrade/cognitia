<form class="login-form" (ngSubmit)="submit()">
  <h3>Restablecer contraseña</h3>

  <div class="form-group">
    <label for="reset-token">Token de recuperación</label>
    <input id="reset-token" [(ngModel)]="token" name="token" type="text" required />
  </div>

  <div class="form-group">
    <label for="new-password">Nueva contraseña</label>
    <input id="new-password" [(ngModel)]="newPassword" name="newPassword" type="password" autocomplete="new-password" required />
  </div>

  <p *ngIf="successMessage" class="success-message">{{ successMessage }}</p>
  <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

  <button class="login-button" type="submit" [disabled]="loading || !token.trim() || !newPassword.trim()">
    {{ loading ? 'Procesando...' : 'Actualizar contraseña' }}
  </button>

  <p>
    <a routerLink="/auth/forgot-password">Solicitar nuevo token</a>
  </p>
  <p>
    <a routerLink="/auth/login">Volver a login</a>
  </p>
</form>
