<div class="patients-container">
  <h2>Nuevo paciente</h2>

  <p *ngIf="error" class="error">{{ error }}</p>

  <form (ngSubmit)="onSubmit()" #createForm="ngForm">
    <label>
      Nombre completo
      <input type="text" name="fullName" [(ngModel)]="form.fullName" required />
    </label>
    <label>
      Fecha de nacimiento
      <input type="date" name="birthDate" [(ngModel)]="form.birthDate" required />
    </label>
    <label>
      Sexo
      <input type="text" name="sex" [(ngModel)]="form.sex" />
    </label>
    <label>
      Código interno
      <input type="text" name="internalCode" [(ngModel)]="form.internalCode" />
    </label>

    <div class="actions">
      <button type="submit" [disabled]="!createForm.form.valid || saving">
        {{ saving ? 'Guardando...' : 'Crear paciente' }}
      </button>
      <button type="button" [disabled]="saving" (click)="onCancel()">Cancelar</button>
    </div>
  </form>
</div>
