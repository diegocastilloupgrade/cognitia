<div class="patients-container">
  <h2>Pacientes</h2>
  <p>
    <a [routerLink]="['/patients/new']">Nuevo paciente</a>
  </p>

  <p *ngIf="loading">Cargando...</p>
  <p *ngIf="error" class="error">{{ error }}</p>

  <table *ngIf="!loading && patients.length > 0">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre completo</th>
        <th>Fecha de nacimiento</th>
        <th>Activo</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let patient of patients">
        <td>{{ patient.id }}</td>
        <td>{{ patient.fullName }}</td>
        <td>{{ patient.birthDate }}</td>
        <td>{{ patient.active ? 'Sí' : 'No' }}</td>
        <td>
          <a [routerLink]="['/patients', patient.id, 'edit']">Editar</a>
          <ng-container *ngIf="confirmDeleteId !== patient.id; else confirmDeleteTpl">
            <button type="button" (click)="askDelete(patient.id)">Eliminar</button>
          </ng-container>
          <ng-template #confirmDeleteTpl>
            <span>¿Confirmar?</span>
            <button type="button" (click)="confirmDelete(patient)">Sí</button>
            <button type="button" (click)="cancelDelete()">No</button>
          </ng-template>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="!loading && patients.length === 0 && !error">No hay pacientes registrados.</p>
</div>
