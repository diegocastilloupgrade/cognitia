services:
  postgres:
    image: postgres:16-alpine
    container_name: cognitia-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cognitia}
      POSTGRES_USER: ${POSTGRES_USER:-cognitia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cognitia_dev_password}
    volumes:
      - cognitia_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cognitia} -d ${POSTGRES_DB:-cognitia}"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

volumes:
  cognitia_postgres_data:
    name: cognitia_postgres_data
